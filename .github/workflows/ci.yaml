name: CI

on:
  push:
    branches: [main, develop]
  pull_request:

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - name: Install ruff
        run: pip install ruff
      - name: Ruff check
        run: ruff check custom_components/
      - name: Ruff format check
        run: ruff format --check custom_components/
      - name: Codegen drift check
        run: python tools/codegen.py --check

  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.13', '3.14']
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          allow-prereleases: true
      - name: Install dependencies
        # pytest-homeassistant-custom-component is pinned because newer releases
        # tighten lingering-task detection and force broad fixture rewrites
        # across our integration tests. 0.13.323 matches the dev environment
        # used to vet these tests locally.
        run: |
          pip install -e ".[dev]" 2>/dev/null || pip install -e .
          pip install aiomqtt pytest pytest-asyncio "pytest-homeassistant-custom-component==0.13.316" pytest-cov "syrupy>=5.0,<6.0" pydantic ruff
      - name: Run tests
        run: |
          pytest tests/hacs/ -v -o asyncio_mode=auto --cov=custom_components/sber_mqtt_bridge --cov-report=term-missing --cov-report=xml -k "not test_config_flow"
