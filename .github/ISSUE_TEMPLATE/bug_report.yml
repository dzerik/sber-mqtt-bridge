name: Bug Report
description: Report a bug in Sber MQTT Bridge
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear description of the bug
    validations:
      required: true
  - type: input
    id: ha-version
    attributes:
      label: Home Assistant version
      placeholder: "2025.12.0"
    validations:
      required: true
  - type: input
    id: integration-version
    attributes:
      label: Integration version
      placeholder: "0.1.0"
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant log output
      render: shell
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
